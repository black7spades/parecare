version: "3.9"

# PareCare — Servalan test stack
# Usage:
#   cp .env.servalan .env
#   docker compose -f docker-compose.servalan.yml up -d
#   docker compose -f docker-compose.servalan.yml exec api npm run migrate
#   docker compose -f docker-compose.servalan.yml exec api npm run seed

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-parecare}
      POSTGRES_USER: ${DB_USER:-parecare}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-parecare}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api:
    build:
      context: ./packages/api
      target: production
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://${DB_USER:-parecare}:${DB_PASSWORD}@db:5432/${DB_NAME:-parecare}
      REDIS_URL: redis://redis:6379
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./packages/web
      target: production
    restart: unless-stopped
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
  uploads_data:
