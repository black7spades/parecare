upstream api {
  server api:3001;
}

upstream web {
  server web:80;
}

server {
  listen 80;

  # Allow document uploads up to the API's 50 MB limit. Without this, nginx's
  # 1 MB default rejects anything larger and the browser reports "Failed to
  # fetch" because the connection is dropped before the API ever sees it.
  client_max_body_size 50m;
  # Give large uploads time to reach the API before nginx times out.
  proxy_read_timeout 120s;
  proxy_send_timeout 120s;

  # Stripe webhooks — pass raw body through without buffering
  location /webhooks/ {
    proxy_pass http://api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_request_buffering off;
  }

  location /api/ {
    proxy_pass http://api;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location / {
    proxy_pass http://web;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Real-IP $remote_addr;
  }
}
